# Service account for the web app — allows it to manage agent pods
apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-manager
  namespace: goldilocks
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-manager-role
  namespace: goldilocks
rules:
  # Manage per-user agent pods
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["create", "delete", "get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["pods/portforward"]
    verbs: ["create"]
  # Manage per-user workspace PVCs
  - apiGroups: [""]
    resources: ["persistentvolumeclaims"]
    verbs: ["create", "get", "list"]
  # Read the SSH key secret (for agent pods that need HPC access)
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get"]
    resourceNames: ["hpc-ssh-key"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-manager-binding
  namespace: goldilocks
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: agent-manager-role
subjects:
  - kind: ServiceAccount
    name: agent-manager
    namespace: goldilocks
