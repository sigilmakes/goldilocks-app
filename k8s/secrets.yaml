# Secrets template — DO NOT commit with real values
# Create with:
#   kubectl create secret generic app-secrets \
#     --from-literal=jwt-secret="$(openssl rand -hex 32)" \
#     --from-literal=encryption-key="$(openssl rand -hex 32)" \
#     -n goldilocks
#
#   kubectl create secret generic api-keys \
#     --from-literal=anthropic="sk-ant-..." \
#     -n goldilocks
#
#   kubectl create secret generic hpc-ssh-key \
#     --from-file=id_ed25519=/path/to/key \
#     --from-file=known_hosts=/path/to/known_hosts \
#     -n goldilocks
---
apiVersion: v1
kind: Secret
metadata:
  name: app-secrets
  namespace: goldilocks
type: Opaque
stringData:
  jwt-secret: CHANGE-ME
  encryption-key: CHANGE-ME
---
apiVersion: v1
kind: Secret
metadata:
  name: api-keys
  namespace: goldilocks
type: Opaque
stringData:
  anthropic: ""
  openai: ""
  google: ""
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hpc-config
  namespace: goldilocks
data:
  host: ""      # e.g., login.hpc.example.ac.uk
  user: ""      # e.g., shared-service-account
  partition: "" # e.g., compute
