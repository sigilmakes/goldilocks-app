# Agent Pod Template — reference spec for per-user agent containers
# The web app creates pods matching this spec dynamically via the k8s API
# NOT applied directly — used by ContainerSessionBackend as a reference
#
# Agent pods are paper-thin: just Pi SDK + MCP client.
# All science tools and HPC access go through the MCP server.
apiVersion: v1
kind: Pod
metadata:
  name: agent-USERID8-CONVID8  # dynamically set: agent-{userId first 8}-{convId first 8}
  namespace: goldilocks
  labels:
    app: goldilocks-agent
    role: agent
    goldilocks/user: USERID      # dynamically set
    goldilocks/conversation: CONVID  # dynamically set
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  containers:
    - name: agent
      image: goldilocks-agent:latest  # overridden by AGENT_IMAGE env var
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        readOnlyRootFilesystem: true
      env:
        - name: USER_ID
          value: USERID
        - name: SESSION_ID
          value: CONVID
        - name: WEB_APP_URL
          value: http://web-app.goldilocks.svc.cluster.local:3000
        - name: MCP_SERVER_URL
          value: http://mcp-server.goldilocks.svc.cluster.local:3100
      ports:
        - containerPort: 8080
          name: agent
      volumeMounts:
        - name: scratch
          mountPath: /tmp
        - name: workspace
          mountPath: /work
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
  volumes:
    - name: scratch
      emptyDir:
        medium: Memory
        sizeLimit: 256Mi
    - name: workspace
      persistentVolumeClaim:
        claimName: workspace-USERID  # dynamically set: workspace-{userId first 40}
