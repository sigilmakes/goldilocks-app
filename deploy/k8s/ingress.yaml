# Ingress for external access — adjust for your ingress controller
# Supports both nginx-ingress and traefik (k3s default)
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: goldilocks-ingress
  namespace: goldilocks
  annotations:
    # For nginx-ingress:
    # nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    # nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # nginx.ingress.kubernetes.io/websocket-services: web-app
    #
    # For traefik (k3s default):
    # traefik.ingress.kubernetes.io/router.entrypoints: websecure
    # traefik.ingress.kubernetes.io/router.tls: "true"
    {}
spec:
  rules:
    - host: goldilocks.example.com  # Replace with actual hostname
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: web-app
                port:
                  number: 3000
  tls:
    - hosts:
        - goldilocks.example.com
      secretName: goldilocks-tls  # cert-manager or manual TLS secret
