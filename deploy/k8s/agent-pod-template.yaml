# Agent Pod Template — reference spec for per-user agent containers
# The web app creates pods matching this spec dynamically via the k8s API
# NOT applied directly — used by ContainerSessionBackend
#
# Agent pods are paper-thin: just Pi SDK + MCP client.
# All science tools and HPC access go through the MCP server.
apiVersion: v1
kind: Pod
metadata:
  name: agent-USERID-SESSIONID  # dynamically set by web app
  namespace: goldilocks
  labels:
    app: goldilocks-agent
    role: agent
    user: USERID  # dynamically set
spec:
  restartPolicy: Never
  automountServiceAccountToken: false
  securityContext:
    runAsNonRoot: true
    runAsUser: 1000
    runAsGroup: 1000
    fsGroup: 1000
  containers:
    - name: agent
      image: ghcr.io/sigilmakes/goldilocks-agent:latest
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop: ["ALL"]
        readOnlyRootFilesystem: true
      env:
        - name: USER_ID
          value: USERID
        - name: SESSION_ID
          value: SESSIONID
        - name: WEB_APP_URL
          value: http://web-app.goldilocks.svc.cluster.local:3000
        - name: MCP_SERVER_URL
          value: http://mcp-server.goldilocks.svc.cluster.local:3100
      ports:
        - containerPort: 8080
          name: agent
      volumeMounts:
        - name: scratch
          mountPath: /tmp
        - name: work
          mountPath: /work
      resources:
        requests:
          cpu: 250m
          memory: 256Mi
        limits:
          cpu: 500m
          memory: 512Mi
  volumes:
    - name: scratch
      emptyDir:
        medium: Memory
        sizeLimit: 256Mi
    - name: work
      emptyDir:
        sizeLimit: 1Gi
