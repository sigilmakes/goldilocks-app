apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-app
  namespace: goldilocks
  labels:
    app.kubernetes.io/name: web-app
    app.kubernetes.io/component: frontend
spec:
  replicas: 1
  selector:
    matchLabels:
      app: web-app
  template:
    metadata:
      labels:
        app: web-app
        role: frontend
    spec:
      serviceAccountName: agent-manager
      containers:
        - name: web-app
          image: goldilocks-web
          ports:
            - containerPort: 3000
              name: http
            - containerPort: 5173
              name: vite
          env:
            - name: NODE_ENV
              value: development
            - name: PORT
              value: "3000"
            - name: K8S_NAMESPACE
              value: goldilocks
            - name: DATA_DIR
              value: /data
            - name: AGENT_IMAGE
              value: goldilocks-agent:latest
            - name: AGENT_SERVICE_URL
              value: http://agent-service:3001
            - name: AGENT_SERVICE_WS_URL
              value: ws://agent-service:3001/ws
            - name: AGENT_SERVICE_SHARED_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: agent-service-shared-secret
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: jwt-secret
            - name: ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secrets
                  key: encryption-key

          volumeMounts:
            - name: data
              mountPath: /data
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 2Gi
          readinessProbe:
            httpGet:
              path: /api/ready
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          lifecycle:
            preStop:
              exec:
                command: ['sh', '-c', 'sleep 5']
          terminationGracePeriodSeconds: 30

      volumes:
        - name: data
          hostPath:
            path: /data/goldilocks
            type: DirectoryOrCreate
---
apiVersion: v1
kind: Service
metadata:
  name: web-app
  namespace: goldilocks
spec:
  selector:
    app: web-app
  ports:
    - port: 3000
      targetPort: 3000
      name: http
    - port: 5173
      targetPort: 5173
      name: vite
